name: Deploy to Railway

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'packages/**'
      - 'services/fashion-vtone/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: # Allow manual trigger from GitHub UI

# ─── Required GitHub Secrets (set in repo Settings → Secrets → Actions) ─
#
#   RAILWAY_TOKEN              — Railway project token
#                                 (Project Dashboard → Settings → Tokens)
#   RAILWAY_API_SERVICE_ID     — Service ID from Railway API service
#                                 (URL: /project/{p}/service/{this_id})
#   RAILWAY_WEB_SERVICE_ID     — Service ID from Railway Web service
#   RAILWAY_VTONE_SERVICE_ID   — Service ID from Railway V-Tone service
#   PROD_DATABASE_URL          — Supabase production connection string,
#                                 used to run `prisma migrate deploy`
#                                 before the new API version goes live
#
# Security best practice: enable "Require status checks" branch
# protection on main so CI must pass before merge. This prevents
# broken code from reaching main and triggering a deploy.

env:
  NODE_VERSION: '20'

jobs:
  ####################################################################
  # Detect which services changed
  ####################################################################
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      vtone: ${{ steps.filter.outputs.vtone }}
    steps:
      - uses: actions/checkout@v7

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/db/**'
              - 'packages/ai/**'
              - 'packages/shared/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
            web:
              - 'apps/web/**'
              - 'packages/shared/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
            vtone:
              - 'services/fashion-vtone/**'

  ####################################################################
  # Deploy API Service
  ####################################################################
  deploy-api:
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.api == 'true'

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run pending migrations
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: pnpm --filter @kanchuki/db exec prisma migrate deploy

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.com/install.sh | bash
          echo "$HOME/.railway/bin" >> "$GITHUB_PATH"

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach --environment production --service ${{ secrets.RAILWAY_API_SERVICE_ID }}

  ####################################################################
  # Deploy Web Service
  ####################################################################
  deploy-web:
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.web == 'true'

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.com/install.sh | bash
          echo "$HOME/.railway/bin" >> "$GITHUB_PATH"

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach --environment production --service ${{ secrets.RAILWAY_WEB_SERVICE_ID }}

  ####################################################################
  # Deploy Fashion V-Tone v1.5 Service (Docker)
  ####################################################################
  deploy-vtone:
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.vtone == 'true'

    steps:
      - uses: actions/checkout@v7

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.com/install.sh | bash
          echo "$HOME/.railway/bin" >> "$GITHUB_PATH"

      - name: Deploy V-Tone to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach --environment production --service ${{ secrets.RAILWAY_VTONE_SERVICE_ID }}
