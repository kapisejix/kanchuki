name: Build & Push CatVTON Docker Image

on:
  push:
    branches: [main, master]
    paths:
      - 'services/tryon/**'
      - '.github/workflows/docker-tryon.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: snumbhraal
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push CatVTON try-on image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/tryon/Dockerfile.runpod
          push: true
          tags: snumbhraal/kanchuki-tryon:latest
          platforms: linux/amd64
          # Cache from previously built image to speed up rebuilds
          cache-from: type=registry,ref=snumbhraal/kanchuki-tryon:cache
          cache-to: type=registry,ref=snumbhraal/kanchuki-tryon:cache,mode=max
