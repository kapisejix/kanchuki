name: Build & Push CatVTON Docker Image

on:
  push:
    branches: [main, master]
    paths:
      - 'services/tryon/**'
      - '.github/workflows/docker-tryon.yml'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: kapisejix
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push CatVTON try-on image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: services/tryon/Dockerfile.runpod
          push: true
          tags: ghcr.io/kapisejix/kanchuki-tryon:latest
          platforms: linux/amd64
          # Cache from previously built image to speed up rebuilds
          cache-from: type=registry,ref=ghcr.io/kapisejix/kanchuki-tryon:cache
          cache-to: type=registry,ref=ghcr.io/kapisejix/kanchuki-tryon:cache,mode=max
